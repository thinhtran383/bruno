name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Build Web App
        run: npm run build:web

      - name: Build Linux Distribution
        run: npm run build:electron:linux

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: packages/bruno-electron/out/*.AppImage
          retention-days: 7

  build-linux-deb:
    name: Build Linux (deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Build Web App
        run: npm run build:web

      - name: Build Debian Package
        run: npm run build:electron:deb

      - name: Upload Debian Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-artifacts
          path: packages/bruno-electron/out/*.deb
          retention-days: 7

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Build Web App
        run: npm run build:web

      - name: Build macOS Distribution
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:electron:mac

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            packages/bruno-electron/out/*.dmg
            packages/bruno-electron/out/*.pkg
            packages/bruno-electron/out/*.zip
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Build Web App
        run: npm run build:web

      - name: Build Windows Distribution
        run: node ./scripts/build-electron.js

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: packages/bruno-electron/out/**/*.exe
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build-linux, build-linux-deb, build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts

      - name: Download Linux deb Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-deb-artifacts
          path: release-artifacts

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-artifacts
          path: release-artifacts

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          draft: true
          generate_release_notes: true
